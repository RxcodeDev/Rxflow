<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — RxCode</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <main class="login-card" role="main">

    <!-- Logo + wordmark -->
    <div class="login-logo">
      <div class="login-brand">
        <svg class="brand-chevrons" width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <!-- ejes -->
          <line x1="3" y1="3" x2="3" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="3" y1="21" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <!-- barras Gantt -->
          <rect x="5" y="5" width="9" height="3" rx="1.5" fill="currentColor"/>
          <rect x="8" y="10" width="11" height="3" rx="1.5" fill="currentColor"/>
          <rect x="5" y="15" width="7" height="3" rx="1.5" fill="currentColor"/>
        </svg>
        <span class="brand-name">Rxflow</span>
      </div>
    </div>

    <!-- Encabezado -->
    <h1 class="login-title">Bienvenido de nuevo</h1>
    <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

    <!-- Formulario -->
    <form class="login-form" action="#" method="post" novalidate>

      <div class="field">
        <label class="field-label" for="email">Correo electrónico</label>
        <div class="field-input-wrap">
          <span class="field-icon">
            <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
          </span>
          <input
            class="field-input"
            type="email"
            id="email"
            name="email"
            placeholder="carlos@empresa.com"
            autocomplete="email"
            required
          >
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Contraseña</label>
        <div class="field-input-wrap">
          <span class="field-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          </span>
          <input
            class="field-input"
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
        </div>
      </div>

      <div class="field-forgot">
        <a href="#" class="link-small">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn-primary">Iniciar sesión</button>

    </form>

    <!-- Divisor -->
    <div class="login-divider" aria-hidden="true"><span>o</span></div>

    <!-- Footer -->
    <p class="login-footer">
      ¿No tienes cuenta? <a href="#">Regístrate</a>
    </p>

  </main>

</body>
</html>
