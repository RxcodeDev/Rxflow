services:
  postgres:
    image: postgres:16-alpine
    container_name: rxflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    pull_policy: build
    container_name: rxflow_backend
    restart: unless-stopped
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DB_USER}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      DATABASE_NAME: ${DB_NAME}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "${BACKEND_PORT:-}:3000"
    networks:
      - app_network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rxflow-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.rxflow-api.entrypoints=websecure"
      - "traefik.http.routers.rxflow-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.rxflow-api.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-public"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    pull_policy: build
    container_name: rxflow_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    ports:
      - "${FRONTEND_PORT:-}:3001"
    networks:
      - app_network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rxflow.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.rxflow.entrypoints=websecure"
      - "traefik.http.routers.rxflow.tls.certresolver=letsencrypt"
      - "traefik.http.services.rxflow.loadbalancer.server.port=3001"
      - "traefik.docker.network=traefik-public"

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: rxflow_cloudbeaver
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${CB_PORT:-}:8978"
    networks:
      - app_network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rxflow-db.rule=Host(`${DB_DOMAIN}`)"
      - "traefik.http.routers.rxflow-db.entrypoints=websecure"
      - "traefik.http.routers.rxflow-db.tls.certresolver=letsencrypt"
      - "traefik.http.services.rxflow-db.loadbalancer.server.port=8978"
      - "traefik.docker.network=traefik-public"

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
  traefik-public:
    external: true